<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>GigSplit — Steve</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="wrap">
  <div class="header-row">
    <div class="brand">
      <span class="brand-icon">♪</span>
      <div>
        <h1>GigSplit</h1>
        <p class="sub">Steve's view • live sync</p>
      </div>
    </div>
    <div class="header-actions">
      <span id="syncIndicator" class="sync-dot sync-off" title="Sync status"></span>
    </div>
  </div>
</header>

<main class="wrap main-grid">

  <!-- LEFT: UPCOMING GIGS -->
  <section class="card">
    <h2 class="card-heading">Upcoming gigs</h2>
    <div id="upcomingGigs"><div class="history-empty">No upcoming gigs.</div></div>

    <h2 class="card-heading" style="margin-top:24px;">Past gigs</h2>
    <div id="pastGigs"><div class="history-empty">No past gigs.</div></div>
  </section>

  <!-- RIGHT: AVAILABILITY -->
  <section class="card">
    <h2 class="card-heading">Availability</h2>
    <p class="hint">Tap dates you can't do. Steve White sees this live.</p>
    <div id="availCalendar" class="avail-calendar"></div>

    <div id="steveOneUnavail" class="unavail-list" style="margin-top:16px;"></div>
  </section>

</main>

<script type="module" src="steve.js"></script>
</body>
</html>
