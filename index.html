<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>GigSplit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="wrap">
  <div class="header-row">
    <div class="brand">
      <span class="brand-icon">♪</span>
      <div>
        <h1>GigSplit</h1>
        <p class="sub">Your view • live sync</p>
      </div>
    </div>
    <div class="header-actions">
      <span id="syncIndicator" class="sync-dot sync-off" title="Sync status"></span>
      <button id="settingsBtn" class="icon-btn" title="Settings">⚙</button>
    </div>
  </div>
  <div class="toolbar">
    <button id="exportCsvBtn" class="btn btn-ghost">↓ CSV</button>
    <button id="shareGigsBtn" class="btn btn-ghost">↑ Share gig list</button>
    <button id="clearHistoryBtn" class="btn btn-danger">✕ Clear history</button>
  </div>
</header>

<!-- SETTINGS -->
<div id="settingsPanel" class="overlay hidden">
  <div class="overlay-box">
    <div class="overlay-header">
      <h2>Settings</h2>
      <button id="closeSettingsBtn" class="icon-btn">✕</button>
    </div>
    <div class="settings-groups">
      <div class="setting-group">
        <h3>⛽ Fuel</h3>
        <label>Your car's MPG
          <input id="settingMpg" type="number" placeholder="e.g. 40" step="0.1">
        </label>
        <label>Fuel price (pence per litre)
          <input id="settingFuelPrice" type="number" placeholder="e.g. 145" step="0.1">
        </label>
      </div>
      <div class="setting-group">
        <h3>📱 SWJ</h3>
        <label>WhatsApp number (country code, no +)
          <input id="settingWhatsapp" type="text" placeholder="e.g. 447700900123">
        </label>
      </div>
      <div class="setting-group">
        <h3>⏱ Time defaults</h3>
        <label>Avg driving speed (mph)
          <input id="settingAvgSpeed" type="number" placeholder="40">
        </label>
        <label>Setup time (hrs)
          <input id="settingSetupHours" type="number" placeholder="1" step="0.5">
        </label>
        <label>Play time (hrs)
          <input id="settingPlayHours" type="number" placeholder="2" step="0.5">
        </label>
      </div>
    </div>
    <button id="saveSettingsBtn" class="btn btn-primary full-width">Save settings</button>
  </div>
</div>

<main class="wrap main-grid">

  <!-- LEFT: FORM + AVAILABILITY -->
  <div class="left-col">

    <section class="card">
      <h2 class="card-heading">New gig</h2>
      <label>Date
        <input id="date" type="date">
      </label>
      <label>Venue / Town
        <input id="town" list="townList" placeholder="e.g. Llandudno">
        <datalist id="townList"></datalist>
      </label>
      <label>Agreed fee (£)
        <input id="fee" type="number" placeholder="200">
        <span id="feeHint" class="field-hint hidden"></span>
      </label>
      <label>Colwyn Bay → Venue (one-way miles)
        <input id="miles" type="number" step="0.1" placeholder="15">
      </label>
      <label>Venue notes <span class="optional">(saved with town)</span>
        <input id="notes" type="text" placeholder="e.g. back entrance, ask for Dave">
      </label>

      <div class="btn-row">
        <button id="calcBtn" class="btn btn-primary">Calculate</button>
        <button id="saveTownBtn" class="btn btn-ghost">Save town</button>
      </div>

      <div id="warning" class="warning hidden"></div>

      <div id="resultsBlock" class="results-block hidden">
        <div class="split-box">
          <div class="split-col">
            <div class="split-name">You</div>
            <div class="split-amount" id="youGet">—</div>
            <div class="split-net" id="youNet"></div>
          </div>
          <div class="split-divider">÷ 2</div>
          <div class="split-col">
            <div class="split-name">SWJ</div>
            <div class="split-amount" id="heGets">—</div>
          </div>
        </div>

        <div class="results-grid">
          <div class="result-row"><span>Total miles (return)</span><strong id="totalMiles">—</strong></div>
          <div class="result-row" id="fuelCostRow"><span>Fuel cost</span><strong id="fuelCost" class="text-amber">—</strong></div>
          <div class="result-row"><span>Worth it?</span><strong id="worthIt">—</strong></div>
          <div class="result-row"><span>Your hourly rate</span><strong id="hourlyRate">—</strong></div>
        </div>

        <div class="action-row">
          <button id="saveGigBtn" class="btn btn-primary" disabled>Save &amp; sync</button>
          <button id="whatsappBtn" class="btn btn-whatsapp" disabled>WhatsApp SWJ</button>
          <button id="icsBtn" class="btn btn-ghost" disabled>↓ Calendar</button>
          <button id="shareBtn" class="btn btn-ghost" disabled>Share</button>
        </div>
      </div>
    </section>

    <!-- AVAILABILITY -->
    <section class="card">
      <h2 class="card-heading">Availability</h2>
      <p class="hint">Block out dates you can't do. SWJ sees this live.</p>
      <div id="availCalendar" class="avail-calendar"></div>
      <div id="steveUnavail" class="unavail-list"></div>
    </section>

  </div>

  <!-- RIGHT: STATS + HISTORY -->
  <section class="card">
    <div class="stats-tabs">
      <button class="tab-btn active" data-tab="month">This month</button>
      <button class="tab-btn" data-tab="year">This year</button>
      <button class="tab-btn" data-tab="all">All time</button>
    </div>
    <div class="stats-grid">
      <div class="stat-item"><span class="stat-label">Gigs</span><span class="stat-value" id="statGigs">0</span></div>
      <div class="stat-item"><span class="stat-label">Miles</span><span class="stat-value" id="statMiles">0</span></div>
      <div class="stat-item"><span class="stat-label">You earned</span><span class="stat-value" id="statYou">£0</span></div>
      <div class="stat-item"><span class="stat-label">Fuel spent</span><span class="stat-value" id="statFuel">—</span></div>
    </div>

    <h2 class="card-heading" style="margin-top:20px;">Gig history</h2>
    <div id="history"></div>
  </section>

</main>

<!-- Firebase -->
<script type="module" src="app.js"></script>
</body>
</html>
