<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <title>Gig Split Calculator</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="wrap">
  <div class="header-row">
    <div>
      <h1>Gig Split Calculator</h1>
      <p class="sub">Mileage from Colwyn Bay only • 45p/mile • cash rounded • saves history</p>
    </div>
    <button id="installBtn" class="btn" style="display:none;">Install App</button>
  </div>

  <div class="toolbar">
    <button id="exportCsvBtn" class="btn">Export CSV</button>
    <button id="clearHistoryBtn" class="btn btn-danger">Clear history</button>
  </div>
</header>

<main class="wrap grid">

<section class="card">
<h2>New gig</h2>

<label>Date (optional)
<input id="date" type="date">
</label>

<label>Venue / Town
<input id="town" list="townList">
<datalist id="townList"></datalist>
</label>

<label>Agreed fee (£)
<input id="fee" type="number">
</label>

<label>Colwyn Bay → Venue (one way miles)
<input id="miles" type="number" step="0.1">
</label>

<div class="row">
<button id="calcBtn" class="btn btn-primary">Calculate</button>
<button id="saveTownBtn" class="btn">Save town + miles</button>
<button id="saveGigBtn" class="btn" disabled>Save gig</button>
<button id="shareBtn" class="btn" disabled>Share summary</button>
</div>

<div id="warning" class="warning hidden"></div>

<h3>Results</h3>
<div class="results">
<div><b>Band:</b> <span id="band">—</span></div>
<div><b>Minimum:</b> <span id="minFee">—</span></div>
<div><b>Total miles:</b> <span id="totalMiles">—</span></div>
<div><b>Mileage cost:</b> <span id="mileageCost">—</span></div>

<div class="divider"></div>

<div><b>You get:</b> <span id="youGet">—</span></div>
<div><b>Steve gets:</b> <span id="heGets">—</span></div>

<div class="divider"></div>

<div><b>Worth it?</b> <span id="worthIt">—</span></div>
<div><b>Hourly rate:</b> <span id="hourlyRate">—</span></div>
</div>
</section>

<section class="card">
<h2>This month</h2>
<div class="results">
<div><b>Gigs:</b> <span id="mGigs">0</span></div>
<div><b>Miles:</b> <span id="mMiles">0</span></div>
<div><b>You earned:</b> <span id="mYou">£0</span></div>
</div>

<h2 style="margin-top:16px;">Gig history</h2>
<div id="history"></div>
</section>

</main>

<script src="app.js"></script>
</body>
</html>
