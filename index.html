<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <title>Gig Split Calculator</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="wrap">
  <div class="header-row">
    <div>
      <h1>Gig Split Calculator</h1>
      <p class="sub">Includes Conwy ↔ Colwyn Bay travel • 45p/mile • cash rounded • saves history</p>
    </div>
    <button id="installBtn" class="btn" style="display:none;">Install App</button>
  </div>

  <div class="toolbar">
    <button id="exportCsvBtn" class="btn">Export CSV</button>
    <button id="clearHistoryBtn" class="btn btn-danger">Clear history</button>
  </div>
</header>

<main class="wrap grid">

  <section class="card">
    <h2>New gig</h2>

    <label>
      Date (optional)
      <input id="date" type="date">
    </label>

    <label>
      Venue / Town
      <input id="town" list="townList" placeholder="Start typing…">
      <datalist id="townList"></datalist>
    </label>

    <label>
      Agreed fee (£)
      <input id="fee" type="number" step="1" placeholder="e.g. 350">
    </label>

    <label>
      Colwyn Bay → Venue (one way miles)
      <input id="miles" type="number" step="0.1" placeholder="e.g. 60">
    </label>

<div class="row">
  <button id="calcBtn" class="btn btn-primary">Calculate</button>
  <button id="saveTownBtn" class="btn">Save town + miles</button>
  <button id="saveGigBtn" class="btn" disabled>Save gig</button>
  <button id="shareBtn" class="btn" disabled>Share summary</button>
</div>
